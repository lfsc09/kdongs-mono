<section class="flex flex-col gap-6 px-6 py-12">
  <span class="text-2xl font-medium text-lime-500 select-none">Wallet's Detail</span>
  <div
    class="border-background-2/40 bg-background-1 text-foreground-1 sticky top-20 flex h-14 flex-row items-center justify-end gap-2 rounded border px-4 py-2 backdrop-blur-xs"
  >
    <button class="btn btn-sm" routerLink="edit">
      <i class="fa-solid fa-pencil"></i>
      <span class="ml-2">Edit Wallet</span>
    </button>
    <button class="btn btn-sm btn-outline">
      <i class="fa-solid fa-trash"></i>
      <span class="ml-2">Delete Wallet</span>
    </button>
  </div>
  @if (walletId !== undefined) {
    <kdongs-wallet-movement [walletId]="walletId" />
  }
</section>
